name: OpenAPI

on:
  push:
    branches: [main, develop]
  pull_request:

jobs:
  lint-and-bundle:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci
      # Gatekeeper — redocly rules are all `error`; build fails on violation.
      - run: npm run lint
      - run: npm run bundle
