        - name: country
          in: path
          required: true
          description: Country code, lowercase.
          schema:
            type: string
            example: vn
        - name: type
          in: query
          required: false
          description: |
            Filter by land-use type.

            | Value | Description |
            | --- | --- |
            | `residential` | Residential land |
            | `commercial` | Commercial land |
            | `production` | Production / industrial land |
          schema:
            type: string
            enum:
              - residential
              - commercial
              - production
        - name: area
          in: query
          required: false
          description: |
            Filter by area / land-value zone.

            | Value | Description |
            | --- | --- |
            | `I` | Value zone I (highest) |
            | `II` | Value zone II |
            | `III` | Value zone III |
            | `IV` | Value zone IV (lowest) |
          schema:
            type: string
            enum:
              - I
              - II
              - III
              - IV
        - name: ward_id
          in: query
          required: false
          description: Filter by ward identifier.
          schema:
