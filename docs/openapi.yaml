    NavGrowthPoint:
      type: object
      description: One point in a NAV-growth series.
      required:
        - date
        - growthRate
        - nav
      properties:
        date:
          type: string
          description: Observation date (DD-MM-YYYY).
          example: 19-03-2026
        growthRate:
          type: number
          description: Cumulative growth rate since the series start, in percent.
          example: 0.07
        nav:
          type: number
          description: Net asset value per share on the date.
          example: 19948.69
    NavGrowthSeries:
      type: object
      description: |
        A single NAV-growth series for one instrument, keyed by period window. Each
        period maps to an ordered array of NAV-growth points. `etfCode` may be an empty
        string when the slot is unused (e.g. the second comparand of a single-fund query).
      required:
        - etfCode
        - data
      properties:
        etfCode:
          type: string
          description: Code of the instrument this series belongs to.
          example: VESAF
        data:
          type: object
          description: NAV-growth points grouped by period window (e.g. `3M`, `6M`, `1Y`, `3Y`).
          additionalProperties:
            type: array
            items:
              $ref: '#/components/schemas/NavGrowthPoint'
          example:
            3M:
              - date: 19-03-2026
                growthRate: 0
                nav: 19934.64
              - date: 20-03-2026
                growthRate: 0.07
                nav: 19948.69
    NavGrowthComparison:
      type: object
      description: |
        NAV-growth comparison payload. Returns the NAV-growth series for two funds
        (`etf1`, `etf2`) benchmarked against the VN-Index (`vnIndex`), the set of
        available period windows and the series start date. The single-fund endpoint
        populates `etf1` and leaves `etf2.etfCode` empty.
      required:
        - etf1
        - etf2
        - vnIndex
        - periodAvailability
        - startDate
      properties:
        etf1:
          $ref: '#/components/schemas/NavGrowthSeries'
        etf2:
          $ref: '#/components/schemas/NavGrowthSeries'
        vnIndex:
          $ref: '#/components/schemas/NavGrowthSeries'
        periodAvailability:
          type: object
          description: Which period windows have data, keyed by period.
          additionalProperties:
            type: boolean
          example:
            1M: false
            3M: true
            6M: true
            1Y: true
            3Y: true
        startDate:
          type: string
          description: Start date of the longest available series (DD-MM-YYYY).
          example: 24-04-2017
    EtfCompareNavGrowthResponse:
      allOf:
        - $ref: '#/components/schemas/EnvelopeBase'
        - type: object
          required:
            - data
          properties:
            data:
              $ref: '#/components/schemas/NavGrowthComparison'
    EtfNavGrowthResponse:
      allOf:
        - $ref: '#/components/schemas/EnvelopeBase'
        - type: object
          required:
            - data
          properties:
            data:
              $ref: '#/components/schemas/NavGrowthComparison'
