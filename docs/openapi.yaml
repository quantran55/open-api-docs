          example: 99.3142
        tag:
          type: string
          enum:
            - gainer
            - loser
          description: Whether the coin is a top gainer or loser.
          example: gainer
    CryptoOverview:
      type: object
      description: |
        Crypto market overview — total market capitalisation, 24h volume, BTC/ETH/major
        dominance split, the Fear & Greed index and a list of trending coins.
      required:
        - totalMarketCap
        - volume24h
        - marketCapChange24h
        - volumeChange24h
        - dominance
        - fearGreed
        - trending
