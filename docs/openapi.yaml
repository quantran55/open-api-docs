components:
  securitySchemes:
    HayInsightsApiKey:
      type: apiKey
      in: header
      name: X-API-Key
      description: |
        Your HayInsights API key (prefixed `apk_`). Create and manage keys in the
        HayInsights dashboard (Account → API keys).

        Send it in the `X-API-Key` header on **every** request to `/openapi/v1/*`.
        Which data domains you may access and your request quota are both governed by
        the subscription plan attached to the key — see the **Plans & features** and
        **Rate limits** guides.
  schemas:
    CommodityCategory:
      type: string
      enum:
        - energy
        - metals
        - agriculture
        - macro
      description: Commodity category.
      example: metals
    SortOrder:
      type: string
      enum:
        - asc
        - desc
      default: desc
      description: Sort direction.
      example: desc
    Meta:
      type: object
      description: Response metadata. Always present; `timestamp` is the server time the response was generated.
      required:
        - timestamp
      properties:
        timestamp:
          type: string
          format: date-time
          description: Server time when the response was generated (ISO 8601).
          example: '2026-06-19T08:31:59.478Z'
      additionalProperties: true
    EnvelopeBase:
      type: object
      description: |
        Standard success envelope shared by every endpoint. Each operation's response
        wrapper extends this (via `allOf`) and adds a typed `data` property.
      required:
        - success
        - statusCode
      properties:
        success:
          type: boolean
          const: true
          description: Always `true` for a successful response.
          example: true
        statusCode:
          type: integer
          description: Mirrors the HTTP status code.
          example: 200
        meta:
          $ref: '#/components/schemas/Meta'
    CommodityPrice:
      type: object
      description: Latest price snapshot for a single commodity.
      required:
        - id
        - name
        - category
        - unit
        - lastClose
        - currency
      properties:
        id:
          type: string
          description: Commodity slug — use as the `{id}` path param for history.
          example: zinc-lme
        name:
          type: string
          example: Zinc (LME)
        category:
          $ref: '#/components/schemas/CommodityCategory'
        unit:
          type: string
          example: USD/ton
        lastClose:
          type: number
          description: Most recent closing price.
          example: 3588
        currency:
          type: string
          example: USD
        change1dPct:
          type: number
          description: 1-day percentage change.
          example: 0.53
        changeMtdPct:
          type: number
          description: Month-to-date percentage change.
          example: 0.28
        changeYtdPct:
          type: number
          description: Year-to-date percentage change.
          example: 14.63
        ma50:
          type: number
          description: 50-period moving average.
          example: 3475.3036
        trend:
          type: string
          enum:
            - bullish
            - bearish
            - neutral
          description: Trend classification derived from the moving average.
          example: bullish
        trendline:
          type: array
          description: Recent closing prices, oldest→newest, for a sparkline.
          items:
            type: number
        updatedAt:
          type: string
          format: date-time
          example: '2026-06-17T00:00:00.000Z'
    CommoditiesListResponse:
      allOf:
        - $ref: '#/components/schemas/EnvelopeBase'
        - type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/CommodityPrice'
    ErrorDetail:
      type: object
      description: Error detail object carried under `error` in the error envelope.
      required:
        - code
        - message
      properties:
        code:
          type: string
          description: |
            Machine-readable error code. Specific for authentication / quota errors
            (e.g. `API_KEY_REQUIRED`, `API_KEY_INVALID`, `FEATURE_NOT_IN_PLAN`,
            `RATE_LIMIT_EXCEEDED`). For validation (400) and not-found (404) the code
            is currently `INTERNAL_ERROR` and the HTTP status carries the semantics.
          example: API_KEY_INVALID
        message:
          description: Human-readable message, or a list of validation messages (400).
          oneOf:
            - type: string
            - type: array
              items:
                type: string
          example: Invalid API key
    ErrorBody:
      type: object
      description: Standard error envelope returned for every 4xx / 5xx response.
      required:
        - success
        - statusCode
        - error
      properties:
        success:
          type: boolean
          const: false
          description: Always `false` for an error response.
          example: false
        statusCode:
          type: integer
          description: Mirrors the HTTP status code.
          example: 401
        error:
          $ref: '#/components/schemas/ErrorDetail'
        meta:
          $ref: '#/components/schemas/Meta'
    FeaturedCommodity:
      type: object
      description: A featured commodity with a short price sparkline.
      required:
        - id
        - name
        - unit
        - lastClose
        - currency
      properties:
        id:
          type: string
          example: gold
        name:
          type: string
          example: Gold
        unit:
          type: string
          example: USD/oz
        lastClose:
          type: number
          example: 4189.22
        currency:
          type: string
          example: USD
        change1dPct:
          type: number
          description: 1-day percentage change.
          example: 0.02
        changeValue:
          type: number
          description: 1-day absolute price change.
          example: 0.77
        trendline:
          type: array
          description: Recent closing prices, oldest→newest, for a sparkline.
          items:
            type: number
    CommoditiesFeaturedResponse:
      allOf:
        - $ref: '#/components/schemas/EnvelopeBase'
        - type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/FeaturedCommodity'
    CommodityMover:
      type: object
      description: A single commodity in a movers (gainers / losers) list.
      required:
        - id
        - name
        - changePct
      properties:
        id:
          type: string
          example: coffee-robusta
        name:
          type: string
          example: Coffee Robusta
        changePct:
          type: number
          description: Percentage change over the requested period.
          example: 7.35
    CommodityMovers:
      type: object
      description: Top gaining and losing commodities over a period.
      required:
        - period
        - gainers
        - losers
      properties:
        period:
          type: string
          description: Period the movers are computed over.
          example: mtd
        gainers:
          type: array
          items:
            $ref: '#/components/schemas/CommodityMover'
        losers:
          type: array
          items:
            $ref: '#/components/schemas/CommodityMover'
    CommoditiesMoversResponse:
      allOf:
        - $ref: '#/components/schemas/EnvelopeBase'
        - type: object
          required:
            - data
          properties:
            data:
              $ref: '#/components/schemas/CommodityMovers'
    IndexedPricePoint:
      type: object
      description: One point of a rebased price series (percentage change vs the series start).
      required:
        - date
        - value
      properties:
        date:
          type: string
          format: date
          example: '2026-03-22'
        pctChange:
          type: number
          description: Percentage change versus the first point in the series.
          example: 0
        value:
          type: number
          description: Raw value on this date.
          example: 4464.66
    GoldDxyCorrelation:
      type: object
      description: Rebased gold and US Dollar Index (DXY) series for correlation analysis.
      required:
        - period
        - series
      properties:
        period:
          type: string
          description: Look-back window.
          example: 3m
        series:
          type: object
          required:
            - gold
            - dxy
          properties:
            gold:
              type: array
              items:
                $ref: '#/components/schemas/IndexedPricePoint'
            dxy:
              type: array
              items:
                $ref: '#/components/schemas/IndexedPricePoint'
    CommoditiesGoldDxyResponse:
      allOf:
        - $ref: '#/components/schemas/EnvelopeBase'
        - type: object
          required:
            - data
          properties:
            data:
              $ref: '#/components/schemas/GoldDxyCorrelation'
    CommodityHistoryPoint:
      type: object
      description: One closing price in a commodity's history series.
      required:
        - date
        - close
      properties:
        date:
          type: string
          format: date
          example: '2026-03-19'
        close:
          type: number
          example: 4651.73
    CommodityHistoryResponse:
      allOf:
        - $ref: '#/components/schemas/EnvelopeBase'
        - type: object
          required:
            - data
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/CommodityHistoryPoint'
    CryptoTrendingCoin:
      type: object
      description: A trending coin in the market overview — a notable 24h gainer or loser.
      required:
        - symbol
        - name
        - rank
        - priceChange24h
        - tag
      properties:
        symbol:
          type: string
          description: Ticker symbol of the coin.
          example: FF
        name:
          type: string
          example: Falcon Finance
        rank:
          type: integer
          description: Market-cap rank of the coin.
          example: 98
        priceChange24h:
          type: number
