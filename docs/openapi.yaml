openapi: 3.1.0
info:
  title: HayInsights Open API
  version: 0.1.0
  description: |
    Programmatic access to the **HayInsights** financial-data hub — commodities,
    crypto, ETF, FX, macroeconomic and real-estate datasets, served from a single
    API surface under `/openapi/v1/*`.

    This specification is the **single source of truth** for the public API
    surface — shared by SDK codegen, the reference docs, and (later) the mock
    server / contract tests.

    ## Authentication

    Every request must carry your API key in the `X-API-Key` header. There is a
    single authentication tier — no request signing. Create and manage keys in
    the HayInsights dashboard (Account → API keys). See **Authentication**.

    ## Plans & quota

    Access to each data domain and your request quota are governed by the
    subscription plan attached to your key. Each endpoint consumes a **weighted**
    amount of your per-minute quota; every response carries `X-RateLimit-*`
    headers. See **Rate limits** and **Plans & features**.
  contact: {}
servers:
  - url: https://stg-api.hayinsights.com
    description: Staging (live — use for demo / Try It)
  - url: https://api.hayinsights.com
    description: Production (not yet deployed)
security:
  - HayInsightsApiKey: []
tags:
  - name: Commodities
    description: Spot prices, top movers, gold–DXY correlation and historical series for energy, metals and agricultural commodities.
  - name: Crypto
    description: Crypto market overview, dominance, bubble map, on-chain and derivatives metrics.
  - name: ETF
    description: Exchange-traded fund listings, performance & net-flow rankings, heatmap, holdings, NAV growth and fund composition.
  - name: FX
    description: Foreign-exchange summary, live table, 90-day correlation matrix and the emerging-market stress monitor.
  - name: Macro
    description: Macroeconomic indicators — GDP, CPI/PCE, exchange rates, population, central-government debt and policy rates / bond yields.
  - name: Real Estate
    description: Real-estate statistics, land prices, administrative geography (provinces / wards) and choropleth GeoJSON, by country.
paths:
  /openapi/v1/commodities:
    get:
      operationId: commoditiesList
      tags:
        - Commodities
      summary: List commodity prices
      description: |
        Latest price snapshot for every tracked commodity across energy, metals,
        agriculture and macro categories — including 1-day / MTD / YTD changes, the
        50-period moving average, a trend classification and a sparkline.
      x-feature-code: commodities_data
      x-api-weight: 3
      parameters:
        - name: category
          in: query
          required: false
          description: |
            Filter by commodity category.

            | Value | Description |
            | --- | --- |
            | `energy` | Energy (crude oil, natural gas, …) |
            | `metals` | Metals (gold, silver, copper, …) |
            | `agriculture` | Agricultural commodities (grains, softs, …) |
            | `macro` | Macro indices (US Dollar Index, …) |
          schema:
            $ref: '#/components/schemas/CommodityCategory'
        - name: search
          in: query
          required: false
          description: Free-text search on the commodity name.
          schema:
            type: string
            example: gold
        - name: sort
          in: query
          required: false
          description: |
            Field to sort by.

            | Value | Description |
            | --- | --- |
            | `name` | Commodity name |
            | `price` | Latest price |
            | `change_1d` | 1-day price change |
            | `mtd` | Month-to-date change |
            | `ytd` | Year-to-date change |
          schema:
            type: string
            enum:
              - name
              - price
              - change_1d
              - mtd
              - ytd
            default: price
        - name: order
          in: query
          required: false
          description: |
            Sort direction.

            | Value | Description |
            | --- | --- |
            | `asc` | Ascending |
            | `desc` | Descending |
          schema:
            $ref: '#/components/schemas/SortOrder'
      responses:
        '200':
          description: List of commodity price snapshots.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommoditiesListResponse'
              example:
                success: true
                statusCode: 200
                data:
                  - id: zinc-lme
                    name: Zinc (LME)
                    category: metals
                    unit: USD/ton
                    lastClose: 3588
                    currency: USD
                    change1dPct: 0.53
                    changeMtdPct: 0.28
                    changeYtdPct: 14.63
                    ma50: 3475.3036
                    trend: bullish
                    trendline:
                      - 3530
                      - 3537
                      - 3555.5
                      - 3491
                      - 3588
                    updatedAt: '2026-06-17T00:00:00.000Z'
                  - id: wti-crude
                    name: WTI Crude Oil
                    category: energy
                    unit: USD/bbl
                    lastClose: 76.55
                    currency: USD
                    change1dPct: -0.33
                    changeMtdPct: -18.93
                    changeYtdPct: 33.41
                    ma50: 95.1804
                    trend: bearish
                    trendline:
                      - 84.29
                      - 81.85
                      - 82.27
                      - 76.8
                      - 76.55
                    updatedAt: '2026-06-19T00:00:00.000Z'
                meta:
                  timestamp: '2026-06-19T08:50:00.811Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /openapi/v1/commodities/featured:
    get:
      operationId: commoditiesFeatured
      tags:
        - Commodities
      summary: Featured commodities
      description: |
        A curated set of headline commodities (gold, crude oil, copper, …) with the
        latest close, 1-day change and a short price sparkline.
      x-feature-code: commodities_data
      x-api-weight: 3
      responses:
        '200':
          description: List of featured commodities.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommoditiesFeaturedResponse'
              example:
                success: true
                statusCode: 200
                data:
                  - id: gold
                    name: Gold
                    unit: USD/oz
                    lastClose: 4189.22
                    currency: USD
                    change1dPct: 0.02
                    changeValue: 0.77
                    trendline:
                      - 4258.86
                      - 4188.45
                      - 4189.22
                  - id: wti-crude
                    name: WTI Crude Oil
                    unit: USD/bbl
                    lastClose: 76.55
                    currency: USD
                    change1dPct: -0.33
                    changeValue: -0.25
                    trendline:
                      - 76.6
                      - 76.8
                      - 76.55
                meta:
                  timestamp: '2026-06-19T08:50:00.811Z'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /openapi/v1/commodities/movers:
    get:
      operationId: commoditiesMovers
      tags:
        - Commodities
      summary: Top movers
      description: |
        The biggest gaining and losing commodities over the requested period.
      x-feature-code: commodities_data
      x-api-weight: 3
      parameters:
        - name: period
          in: query
          required: false
          description: |
            Period the movers are computed over.

            | Value | Description |
            | --- | --- |
            | `mtd` | Month-to-date |
          schema:
            type: string
            enum:
              - mtd
            default: mtd
        - name: limit
          in: query
          required: false
          description: Number of gainers and losers to return (1–10).
          schema:
            type: integer
            minimum: 1
            maximum: 10
            default: 3
      responses:
        '200':
          description: Top gaining and losing commodities.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommoditiesMoversResponse'
              example:
                success: true
                statusCode: 200
                data:
                  period: mtd
                  gainers:
                    - id: coffee-robusta
                      name: Coffee Robusta
                      changePct: 7.35
                    - id: coffee-arabica
                      name: Coffee Arabica
                      changePct: 4.28
                  losers:
                    - id: wti-crude
                      name: WTI Crude Oil
                      changePct: -18.93
                    - id: baltic-dry
                      name: Baltic Dry Index (BDI)
                      changePct: -17.47
                meta:
                  timestamp: '2026-06-19T08:50:00.846Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /openapi/v1/commodities/gold-dxy:
    get:
      operationId: commoditiesGoldDxy
      tags:
        - Commodities
      summary: Gold vs DXY correlation
      description: |
        Rebased gold price and US Dollar Index (DXY) series over the requested
        window, for visualising their (typically inverse) correlation.
      x-feature-code: commodities_data
      x-api-weight: 3
      parameters:
        - name: period
          in: query
          required: false
          description: |
            Look-back window.

            | Value | Description |
            | --- | --- |
            | `1m` | Last 1 month |
            | `3m` | Last 3 months |
            | `ytd` | Year-to-date |
          schema:
            type: string
            enum:
              - 1m
              - 3m
              - ytd
            default: 3m
      responses:
        '200':
          description: Rebased gold and DXY series.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommoditiesGoldDxyResponse'
              example:
                success: true
                statusCode: 200
                data:
                  period: 3m
                  series:
                    gold:
                      - date: '2026-03-22'
                        pctChange: 0
                        value: 4464.66
                      - date: '2026-06-19'
                        pctChange: -6.17
                        value: 4189.22
                    dxy:
                      - date: '2026-03-22'
                        pctChange: 0
                        value: 99.35
                      - date: '2026-06-19'
                        pctChange: 1.42
                        value: 100.757
                meta:
                  timestamp: '2026-06-19T08:50:00.912Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /openapi/v1/commodities/{id}/history:
    get:
      operationId: commoditiesHistory
      tags:
        - Commodities
      summary: Commodity price history
      description: |
        Historical closing prices for a single commodity. Use the `id` slug returned
        by the list endpoint (e.g. `gold`, `wti-crude`).
      x-feature-code: commodities_data
      x-api-weight: 3
      parameters:
        - name: id
          in: path
          required: true
          description: Commodity slug.
          schema:
            type: string
            example: gold
        - name: period
          in: query
          required: false
          description: |
            History window.

            | Value | Description |
            | --- | --- |
            | `7d` | Last 7 days |
            | `1m` | Last 1 month |
            | `3m` | Last 3 months |
            | `ytd` | Year-to-date |
            | `1y` | Last 1 year |
          schema:
            type: string
            enum:
              - 7d
              - 1m
              - 3m
              - ytd
              - 1y
            default: 3m
        - name: interval
          in: query
          required: false
          description: |
            Sampling interval.

            | Value | Description |
            | --- | --- |
            | `daily` | One data point per day |
            | `weekly` | One data point per week |
          schema:
            type: string
            enum:
              - daily
              - weekly
            default: daily
      responses:
        '200':
          description: Closing-price history series.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CommodityHistoryResponse'
              example:
                success: true
                statusCode: 200
                data:
                  - date: '2026-03-19'
                    close: 4651.73
                  - date: '2026-03-20'
                    close: 4491.15
                  - date: '2026-03-22'
                    close: 4464.66
                meta:
                  timestamp: '2026-06-19T08:50:01.000Z'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /openapi/v1/crypto:
