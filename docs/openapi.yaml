        '403':
          $ref: '#/components/responses/Forbidden'
        '429':
          $ref: '#/components/responses/RateLimited'
        '500':
          $ref: '#/components/responses/InternalError'
  /openapi/v1/crypto/bubble-map:
    get:
      operationId: cryptoBubbleMap
      tags:
        - Crypto
      summary: Crypto bubble map
      description: |
        Top coins by market capitalisation with their price change over a selected
        timeframe and a normalised bubble size, for a bubble-map visualisation.
      x-feature-code: crypto_data
      x-api-weight: 3
      parameters:
        - name: timeframe
          in: query
          required: false
          description: |
            Timeframe the price changes are computed over.

            | Value | Description |
            | --- | --- |
            | `1h` | Last 1 hour |
            | `1d` | Last 1 day |
            | `1w` | Last 1 week |
          schema:
            type: string
            enum:
              - 1h
              - 1d
              - 1w
            default: 1d
        - name: limit
          in: query
          required: false
          description: Maximum number of coins to return.
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 100
      responses:
        '200':
          description: Bubble-map dataset for the requested timeframe.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/CryptoBubbleMapResponse'
              example:
