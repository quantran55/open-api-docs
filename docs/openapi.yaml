        totalMarketCap:
          type: number
          description: Total crypto market capitalisation in USD.
          example: 2156391783530.09
        volume24h:
          type: number
          description: Total 24-hour trading volume in USD.
          example: 74938670897.24
        marketCapChange24h:
          type: number
          description: 24-hour change in total market cap, as a percentage.
          example: -2.6314
        volumeChange24h:
          type: number
          description: 24-hour change in total trading volume, as a percentage.
          example: -11.6008
        dominance:
