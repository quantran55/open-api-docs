type: object
description: A trending coin in the market overview — a notable 24h gainer or loser.
required:
  - symbol
  - name
  - rank
  - priceChange24h
  - tag
properties:
  symbol:
    type: string
    description: Ticker symbol of the coin.
    example: FF
  name:
    type: string
    example: Falcon Finance
  rank:
    type: integer
    description: Market-cap rank of the coin.
    example: 98
  priceChange24h:
    type: number
    description: 24-hour price change, as a percentage.
    example: 99.3142
  tag:
    type: string
    enum:
      - new
      - top-gainer
      - top20-mover
      - gainer
    description: Trend category of the coin — newly added, top gainer, top-20 mover, or gainer.
    example: gainer
