              volume24h: 74938670897.24
              marketCapChange24h: -2.6314
              volumeChange24h: -11.6008
              dominance:
                btc: 58.148
                eth: 9.476
                bnb: 3.585
                sol: 1.843
                xrp: 3.242
                other: 23.706
              fearGreed:
                value: 19
                classification: Extreme fear
                date: "2026-06-18"
              trending:
                - symbol: FF
                  name: Falcon Finance
                  rank: 98
                  priceChange24h: 99.3142
                  tag: gainer
                - symbol: DASH
                  name: Dash
                  rank: 74
                  priceChange24h: 28.9689
                  tag: gainer
