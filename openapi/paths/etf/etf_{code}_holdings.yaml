get:
  operationId: etfHoldings
  tags:
    - ETF
  summary: ETF holdings
  description: |
    The underlying constituent holdings of an ETF's basket — ticker, name, shares
    held and position value, as of the latest fund snapshot. Use the exchange
    ticker (e.g. a TSE code like `1306`) as the `{code}` path param.
  x-feature-code: etf_data
  x-api-weight: 8
  parameters:
    - name: code
      in: path
      required: true
      description: Exchange ticker for the ETF (e.g. a TSE code like `1306`).
      schema:
        type: string
        example: "1306"
  responses:
    "200":
      description: Constituent holdings of the ETF.
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/responses/EtfHoldingsResponse.yaml"
          example:
            success: true
            statusCode: 200
            data:
              - id: 6316032
                code: "1301"
                name: KYOKUYO CO LTD
                exchange: TSE
                currency: JPY
                sharesAmount: "350200.000000"
                stockPrice: 4865
                value: "1703723000.000000"
                etfCode: "1306"
                sharesOutstanding: "81194626440.000000"
                fundDate: "2026-04-21"
                isin: JP3257200000
              - id: 6316072
                code: "1860"
                name: TODA CORP
                exchange: TSE
                currency: JPY
                sharesAmount: "7196900.000000"
                stockPrice: 1414.5
                value: "10180015050.000000"
                etfCode: "1306"
                sharesOutstanding: "81194626440.000000"
                fundDate: "2026-04-21"
                isin: JP3627000007
            meta:
              timestamp: "2026-06-19T08:50:39.000Z"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "404":
      $ref: "../../components/responses/NotFound.yaml"
    "429":
      $ref: "../../components/responses/RateLimited.yaml"
    "500":
      $ref: "../../components/responses/InternalError.yaml"
