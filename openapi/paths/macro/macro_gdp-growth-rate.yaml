get:
  operationId: macroGdpGrowthRate
  tags:
    - Macro
  summary: GDP growth rate
  description: |
    Quarterly nominal GDP and its period-over-period growth rate for a country.
    Each point also carries the value's unit and the start/end of the quarter.
  x-feature-code: macro_data
  x-api-weight: 2
  parameters:
    - name: country
      in: query
      required: false
      description: ISO country code.
      schema:
        type: string
        default: JP
        example: JP
  responses:
    "200":
      description: Quarterly GDP growth-rate series.
      content:
        application/json:
          schema:
            $ref: "../../components/schemas/responses/MacroGdpGrowthRateResponse.yaml"
          example:
            success: true
            statusCode: 200
            data:
              - country: JP
                quarter: Q4 2025
                gdp: "672199.300"
                gdpUnit: Billion JPY
                growthRate: 0.6
                realGdp: null
                realGrowthRate: null
                dateFrom: "2025-10-01T00:00:00.000Z"
                dateTo: "2025-12-31T23:59:59.999Z"
              - country: JP
                quarter: Q1 2026
                gdp: "677233.400"
                gdpUnit: Billion JPY
                growthRate: 0.8
                realGdp: null
                realGrowthRate: null
                dateFrom: "2026-01-01T00:00:00.000Z"
                dateTo: "2026-03-31T23:59:59.999Z"
            meta:
              timestamp: "2026-06-19T08:50:42.428Z"
    "400":
      $ref: "../../components/responses/BadRequest.yaml"
    "401":
      $ref: "../../components/responses/Unauthorized.yaml"
    "403":
      $ref: "../../components/responses/Forbidden.yaml"
    "429":
      $ref: "../../components/responses/RateLimited.yaml"
    "500":
      $ref: "../../components/responses/InternalError.yaml"
